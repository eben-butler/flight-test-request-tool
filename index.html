<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flight Test Plan Request</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');
body{background:#f3f4f6;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:#1a2b4a}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2d5cad!important;box-shadow:0 0 0 3px rgba(45,92,173,0.1)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d4dc;border-radius:3px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;

/* ════════════════════════════════════════════════════════════
   CONFIGURATION — Edit these values for your setup
   ════════════════════════════════════════════════════════════ */
const CONFIG={
  EMAILJS_PUBLIC_KEY:"0TXvnAjUE1g37E7RK",
  EMAILJS_SERVICE_ID:"service_q6kwl7n",
  EMAILJS_TEMPLATE_ID:"template_w1t5tqm",
  FTE_EMAIL:"eben.butler@pivotal.aero",
  FTE_NAME:"Eben Butler",
  USE_EMAILJS:true, // Set true once EmailJS is configured
};

const TEST_TYPES=["Software / Firmware Validation","Hardware Qualification","Control System Validation","Sensor Calibration / Validation","Integration Test","Environmental Qualification","Other"];
const RISK_LEVELS=[{value:"low",label:"Low",color:"#2d936c",desc:"No safety-critical systems expected to be affected"},{value:"medium",label:"Medium",color:"#e8973e",desc:"Involves flight-critical systems with mitigations"},{value:"high",label:"High",color:"#d1495b",desc:"Safety-of-flight risk, requires additional review and leadership acceptance"}];
const PRIORITY=[{value:"standard",label:"Standard",desc:"4–6 week lead time"},{value:"elevated",label:"Elevated",desc:"2–3 week lead time"},{value:"urgent",label:"Urgent",desc:"< 2 weeks — requires manager approval"}];

const S={
  page:{minHeight:'100vh',background:'#f3f4f6',padding:'24px 16px 80px',maxWidth:780,margin:'0 auto'},
  header:{marginBottom:16,padding:'20px 24px',background:'#fff',borderRadius:14,border:'1px solid #e5e7eb',boxShadow:'0 1px 3px rgba(0,0,0,0.04)'},
  logo:{width:44,height:44,borderRadius:10,background:'linear-gradient(135deg,#1a2b4a 0%,#2d5cad 100%)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:'#fff',letterSpacing:1},
  noteBanner:{display:'flex',alignItems:'center',gap:10,padding:'12px 18px',marginBottom:16,background:'#fefce8',borderRadius:10,border:'1px solid #fde68a',fontSize:13,color:'#92400e',lineHeight:1.5},
  card:{background:'#fff',borderRadius:14,border:'1px solid #e5e7eb',padding:'8px 28px 28px',boxShadow:'0 1px 3px rgba(0,0,0,0.04)',animation:'fadeIn 0.3s ease'},
  label:{display:'block',fontSize:13,fontWeight:600,color:'#1a2b4a',marginBottom:4},
  hint:{fontSize:12,color:'#9ca3af',margin:'0 0 8px',lineHeight:1.4},
  input:{display:'block',width:'100%',padding:'10px 12px',border:'1.5px solid #d0d4dc',borderRadius:8,fontFamily:"'DM Sans',sans-serif",fontSize:14,color:'#1a2b4a',background:'#fafbfc',transition:'border-color 0.15s,box-shadow 0.15s',boxSizing:'border-box'},
  primaryBtn:{padding:'12px 28px',border:'none',borderRadius:10,background:'#1a2b4a',color:'#fff',fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,cursor:'pointer'},
  secondaryBtn:{padding:'12px 28px',border:'1.5px solid #d0d4dc',borderRadius:10,background:'#fff',color:'#1a2b4a',fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:600,cursor:'pointer'},
  addBtn:{padding:'6px 14px',border:'1.5px dashed #d0d4dc',borderRadius:8,background:'transparent',color:'#6b7280',fontSize:13,cursor:'pointer',marginTop:4},
  removeBtn:{width:32,height:38,border:'none',background:'transparent',color:'#d1495b',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:6,flexShrink:0},
  dropZone:{padding:'28px 20px',border:'2px dashed #d0d4dc',borderRadius:12,background:'#fafbfc',cursor:'pointer',textAlign:'center',transition:'border-color 0.15s,background 0.15s'},
  fileChip:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',marginBottom:6,borderRadius:8,background:'#f8f9fb',border:'1px solid #e5e7eb'},
  successCard:{background:'#fff',borderRadius:16,border:'1px solid #e5e7eb',padding:'44px 36px',textAlign:'center',maxWidth:520,margin:'40px auto 0',boxShadow:'0 4px 16px rgba(0,0,0,0.06)',animation:'fadeIn 0.4s ease'},
};

function TextInput({label,placeholder,value,onChange,required,multiline,rows=3,hint}){
  const Tag=multiline?'textarea':'input';
  return(<div style={{marginBottom:22}}><label style={S.label}>{label}{required&&<span style={{color:'#d1495b',marginLeft:3}}>*</span>}</label>{hint&&<p style={S.hint}>{hint}</p>}<Tag style={{...S.input,...(multiline?{minHeight:rows*28,resize:'vertical'}:{})}} placeholder={placeholder} value={value} onChange={e=>onChange(e.target.value)} rows={multiline?rows:undefined}/></div>);
}
function SelectInput({label,options,value,onChange,required}){
  return(<div style={{marginBottom:22}}><label style={S.label}>{label}{required&&<span style={{color:'#d1495b',marginLeft:3}}>*</span>}</label><select style={{...S.input,cursor:'pointer'}} value={value} onChange={e=>onChange(e.target.value)}><option value="">Select...</option>{options.map(o=><option key={typeof o==='string'?o:o.value} value={typeof o==='string'?o:o.value}>{typeof o==='string'?o:o.label}</option>)}</select></div>);
}
function CardSelect({label,options,value,onChange,required,hint}){
  return(<div style={{marginBottom:22}}><label style={S.label}>{label}{required&&<span style={{color:'#d1495b',marginLeft:3}}>*</span>}</label>{hint&&<p style={S.hint}>{hint}</p>}<div style={{display:'flex',gap:10,flexWrap:'wrap'}}>{options.map(o=>{const sel=value===o.value;return(<button key={o.value} onClick={()=>onChange(o.value)} style={{flex:'1 1 140px',padding:'14px 16px',border:sel?'2px solid #1a2b4a':'2px solid #d0d4dc',borderRadius:10,background:sel?'#f0f3f9':'#fff',cursor:'pointer',textAlign:'left'}}><div style={{fontWeight:700,fontSize:14,color:o.color||'#1a2b4a'}}>{o.label}</div>{o.desc&&<div style={{fontSize:12,color:'#6b7280',marginTop:4}}>{o.desc}</div>}</button>);})}</div></div>);
}
function SectionDivider({title}){return<div style={{margin:'36px 0 22px',borderTop:'2px solid #e5e7eb',paddingTop:20}}><h2 style={{fontSize:17,fontWeight:700,color:'#1a2b4a',letterSpacing:-0.2}}>{title}</h2></div>;}
function HardwareRow({hw,index,onUpdate,onRemove}){return(<div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...S.input,flex:1,marginBottom:0,fontSize:13}} placeholder="Equipment name" value={hw.name} onChange={e=>onUpdate(index,'name',e.target.value)}/><input style={{...S.input,flex:1,marginBottom:0,fontSize:13}} placeholder="Notes" value={hw.notes} onChange={e=>onUpdate(index,'notes',e.target.value)}/><button onClick={()=>onRemove(index)} style={S.removeBtn}>×</button></div>);}
function StakeholderRow({s,index,onUpdate,onRemove}){return(<div style={{display:'flex',gap:8,marginBottom:8}}><input style={{...S.input,flex:1,marginBottom:0,fontSize:13}} placeholder="Name" value={s.name} onChange={e=>onUpdate(index,'name',e.target.value)}/><input style={{...S.input,flex:1,marginBottom:0,fontSize:13}} placeholder="Role / Team" value={s.role} onChange={e=>onUpdate(index,'role',e.target.value)}/><input style={{...S.input,flex:1,marginBottom:0,fontSize:13}} placeholder="Email" value={s.email} onChange={e=>onUpdate(index,'email',e.target.value)}/><button onClick={()=>onRemove(index)} style={S.removeBtn}>×</button></div>);}

function buildDocument(form,refFiles,refNum){
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const rl=RISK_LEVELS.find(r=>r.value===form.riskLevel)?.label||'TBD';
  const pl=PRIORITY.find(p=>p.value===form.priority)?.label||'Standard';
  const tt=form.testType==='Other'?(form.otherTestType||'Other'):(form.testType||'TBD');
  const hw=form.hardware.filter(h=>h.name).map(h=>'  - '+h.name+(h.notes?' — '+h.notes:'')).join('\n')||'  None listed';
  const sk=form.stakeholders.filter(s=>s.name).map(s=>'  - '+s.name+(s.role?' ('+s.role+')':'')+(s.email?' — '+s.email:'')).join('\n')||'  TBD';
  const fn=refFiles.map(f=>'  - '+f.name).join('\n')||'  None attached';
  return `FLIGHT TEST PLAN REQUEST\nReference: ${refNum}\nDate: ${today}\n\nTITLE: ${form.title||'TBD'}\n\n1. REQUEST OVERVIEW\n  Test Type:        ${tt}\n  Requestor:        ${form.requestorName||'TBD'}\n  Team / Dept:      ${form.requestorTeam||'TBD'}\n  Email:            ${form.requestorEmail||'TBD'}\n  Risk Level:       ${rl}\n  Priority:         ${pl}\n\n2. SYSTEM UNDER TEST\n  System Overview:\n    ${form.systemDescription||'TBD'}\n\n  Test Objective:\n    ${form.testObjective||'TBD'}\n\n  Aircraft Config:    ${form.aircraftConfig||'TBD'}\n  SW / FW Version:    ${form.softwareVersion||'TBD'}\n\n  EUT:\n    ${form.eut||'TBD'}\n\n  Additional Hardware:\n${hw}\n\n  Config Notes:\n    ${form.configNotes||'None'}\n\n3. LOGISTICS\n  Stakeholders:\n${sk}\n\n  Duration:         ${form.estimatedDuration||'TBD'}\n  Location:         ${form.testLocation||'TBD'}\n  Env Constraints:  ${form.environmentalConstraints||'None specified'}\n  Notes:            ${form.additionalNotes||'None'}\n\n4. REFERENCE DOCUMENTS\n${fn}\n\n5. FTE USE ONLY (To be completed by Flight Test Engineer)\n  Hazards & Risk Assessment: TBD\n  Test Phases & Test Points: TBD\n  Pass/Fail Criteria: TBD\n  Pre-Test Checklist: TBD\n  Post-Test Checklist: TBD\n  Abort Procedures: TBD\n  Post-Test Analysis: TBD\n`;
}

async function sendEmail(form,refFiles,refNum,docText){
  const rl=RISK_LEVELS.find(r=>r.value===form.riskLevel)?.label||'TBD';
  const pl=PRIORITY.find(p=>p.value===form.priority)?.label||'Standard';
  const tt=form.testType==='Other'?(form.otherTestType||'Other'):(form.testType||'TBD');
  const fnames=refFiles.map(f=>f.name).join(', ')||'None';
  if(CONFIG.USE_EMAILJS){
    try{
      await emailjs.send(CONFIG.EMAILJS_SERVICE_ID,CONFIG.EMAILJS_TEMPLATE_ID,{
        to_email:CONFIG.FTE_EMAIL,to_name:CONFIG.FTE_NAME,
        from_name:form.requestorName||'Unknown',from_email:form.requestorEmail||'no-reply',
        subject:'Flight Test Plan Request: '+form.title+' ['+refNum+']',
        ref_number:refNum,title:form.title,test_type:tt,
        requestor:(form.requestorName||'TBD')+' ('+(form.requestorTeam||'TBD')+')',
        requestor_email:form.requestorEmail||'TBD',risk_level:rl,priority:pl,
        system_overview:form.systemDescription||'TBD',test_objective:form.testObjective||'TBD',
        aircraft_config:form.aircraftConfig||'TBD',sw_version:form.softwareVersion||'TBD',
        eut:form.eut||'TBD',
        hardware:form.hardware.filter(h=>h.name).map(h=>h.name+(h.notes?' — '+h.notes:'')).join('; ')||'None',
        config_notes:form.configNotes||'None',
        stakeholders:form.stakeholders.filter(s=>s.name).map(s=>s.name+(s.role?' ('+s.role+')':'')+(s.email?' — '+s.email:'')).join('; ')||'TBD',
        duration:form.estimatedDuration||'TBD',location:form.testLocation||'TBD',
        env_constraints:form.environmentalConstraints||'None',notes:form.additionalNotes||'None',
        ref_documents:fnames,full_document:docText,
      },CONFIG.EMAILJS_PUBLIC_KEY);
      return{success:true,method:'emailjs'};
    }catch(err){console.error('EmailJS failed:',err);}
  }
  const subject=encodeURIComponent('Flight Test Plan Request: '+form.title+' ['+refNum+']');
  const body=encodeURIComponent('NEW FLIGHT TEST PLAN REQUEST\nReference: '+refNum+'\n\nTitle: '+form.title+'\nTest Type: '+tt+'\nRequestor: '+(form.requestorName||'TBD')+' ('+(form.requestorTeam||'TBD')+')\nEmail: '+(form.requestorEmail||'TBD')+'\nRisk Level: '+rl+'\nPriority: '+pl+'\n\nTest Objective:\n'+form.testObjective+'\n\nSystem Overview:\n'+form.systemDescription+'\n\nAircraft Config: '+(form.aircraftConfig||'TBD')+'\nSW/FW: '+(form.softwareVersion||'TBD')+'\nEUT: '+(form.eut||'TBD')+'\nHardware: '+(form.hardware.filter(h=>h.name).map(h=>h.name+(h.notes?' - '+h.notes:'')).join('; ')||'None')+'\n\nStakeholders: '+(form.stakeholders.filter(s=>s.name).map(s=>s.name+(s.role?' ('+s.role+')':'')).join('; ')||'TBD')+'\nDuration: '+(form.estimatedDuration||'TBD')+'\nLocation: '+(form.testLocation||'TBD')+'\nConstraints: '+(form.environmentalConstraints||'None')+'\nNotes: '+(form.additionalNotes||'None')+'\nRef Docs: '+fnames);
  window.open('mailto:'+CONFIG.FTE_EMAIL+'?subject='+subject+'&body='+body,'_self');
  return{success:true,method:'mailto'};
}

function App(){
  const[submitted,setSubmitted]=useState(false);
  const[generating,setGenerating]=useState(false);
  const[shake,setShake]=useState(false);
  const[missingFields,setMissingFields]=useState([]);
  const[refNum,setRefNum]=useState('');
  const[docBlob,setDocBlob]=useState(null);
  const[deliveryMethod,setDeliveryMethod]=useState('');
  const topRef=useRef(null);
  const fileInputRef=useRef(null);
  const[form,setForm]=useState({title:'',testType:'',otherTestType:'',requestorName:'',requestorTeam:'',requestorEmail:'',priority:'standard',riskLevel:'',systemDescription:'',testObjective:'',softwareVersion:'',aircraftConfig:'',eut:'',hardware:[{name:'',notes:''}],configNotes:'',stakeholders:[{name:'',role:'',email:''}],estimatedDuration:'',testLocation:'',environmentalConstraints:'',additionalNotes:''});
  const[refFiles,setRefFiles]=useState([]);

  useEffect(()=>{if(CONFIG.USE_EMAILJS&&CONFIG.EMAILJS_PUBLIC_KEY!=="YOUR_EMAILJS_PUBLIC_KEY"){emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);}},[]);

  const u=field=>val=>setForm(f=>({...f,[field]:val}));
  const updateList=field=>(i,key,val)=>setForm(f=>{const a=[...f[field]];a[i]={...a[i],[key]:val};return{...f,[field]:a};});
  const addToList=(field,tpl)=>()=>setForm(f=>({...f,[field]:[...f[field],{...tpl}]}));
  const removeFromList=field=>i=>setForm(f=>{const a=f[field].filter((_,idx)=>idx!==i);return{...f,[field]:a.length?a:[Object.fromEntries(Object.keys(f[field][0]).map(k=>[k,'']))]};});
  const handleFileChange=e=>{setRefFiles(p=>[...p,...Array.from(e.target.files)]);e.target.value='';};
  const removeFile=i=>setRefFiles(p=>p.filter((_,idx)=>idx!==i));

  const validate=()=>{const m=[];if(!form.title)m.push('Test Plan Title');if(!form.testType)m.push('Test Type');if(!form.requestorName)m.push('Your Name');if(!form.requestorEmail)m.push('Email');if(!form.riskLevel)m.push('Risk Level');if(!form.testObjective)m.push('Test Objective');return m;};

  const handleSubmit=async()=>{
    const missing=validate();
    if(missing.length>0){setMissingFields(missing);setShake(true);setTimeout(()=>setShake(false),500);topRef.current?.scrollIntoView({behavior:'smooth'});return;}
    setMissingFields([]);setGenerating(true);
    const num='FTP-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);
    setRefNum(num);
    const docText=buildDocument(form,refFiles,num);
    setDocBlob(new Blob([docText],{type:'text/plain'}));
    const result=await sendEmail(form,refFiles,num,docText);
    setDeliveryMethod(result.method);
    setGenerating(false);setSubmitted(true);
    topRef.current?.scrollIntoView({behavior:'smooth'});
  };

  const downloadDoc=()=>{if(!docBlob)return;const url=URL.createObjectURL(docBlob);const a=document.createElement('a');a.href=url;a.download='Flight_Test_Plan_Request_'+refNum+'.txt';a.click();URL.revokeObjectURL(url);};

  if(submitted){return(
    <div style={S.page}><div ref={topRef}/><div style={S.successCard}>
      <div style={{fontSize:52,marginBottom:12}}>{'✈️'}</div>
      <h1 style={{fontSize:24,fontWeight:700,color:'#1a2b4a'}}>Request Submitted</h1>
      <p style={{fontSize:14,color:'#6b7280',margin:'10px 0 0',lineHeight:1.6}}>Your flight test plan request for <strong style={{color:'#1a2b4a'}}>{form.title}</strong> has been submitted.</p>
      <div style={{margin:'20px 0',padding:'14px 20px',background:'#f8f9fb',borderRadius:10,border:'1px solid #e5e7eb'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:'#6b7280',marginBottom:4}}>Reference Number</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:18,fontWeight:500,color:'#1a2b4a',letterSpacing:1}}>{refNum}</div>
      </div>
      {deliveryMethod==='emailjs'?(
        <div style={{padding:'12px 18px',background:'#f0fdf4',borderRadius:10,border:'1px solid #bbf7d0',marginBottom:16}}>
          <p style={{fontSize:13,color:'#166534',margin:0}}>{'✅'} Request automatically sent to {CONFIG.FTE_NAME} ({CONFIG.FTE_EMAIL})</p>
        </div>
      ):(
        <div style={{padding:'12px 18px',background:'#fefce8',borderRadius:10,border:'1px solid #fde68a',marginBottom:16}}>
          <p style={{fontSize:13,color:'#92400e',margin:0,lineHeight:1.5}}>{'📧'} Your email client should have opened with the request pre-filled. <strong>Please click Send</strong> to deliver to {CONFIG.FTE_NAME}.</p>
        </div>
      )}
      <button onClick={downloadDoc} style={{...S.primaryBtn,display:'inline-flex',alignItems:'center',gap:8,marginTop:8}}>{'📄'} Download a Copy</button>
      <p style={{fontSize:12,color:'#9ca3af',marginTop:20,lineHeight:1.5}}>The Flight Test Engineering team will review your request and reach out within 2 business days.</p>
      <button onClick={()=>{setSubmitted(false);setDocBlob(null);setDeliveryMethod('');setForm(f=>({...f,title:'',testType:'',otherTestType:'',systemDescription:'',testObjective:'',softwareVersion:'',aircraftConfig:'',eut:'',hardware:[{name:'',notes:''}],configNotes:'',stakeholders:[{name:'',role:'',email:''}],estimatedDuration:'',testLocation:'',environmentalConstraints:'',additionalNotes:''}));setRefFiles([]);}} style={{...S.addBtn,marginTop:24,padding:'10px 20px'}}>Submit Another Request</button>
    </div></div>
  );}

  return(
    <div style={S.page}><div ref={topRef}/>
      <div style={S.header}><div style={{display:'flex',alignItems:'center',gap:14}}><div style={S.logo}>FTE</div><div><h1 style={{fontSize:22,fontWeight:700,color:'#1a2b4a'}}>Flight Test Plan Request</h1><p style={{fontSize:13,color:'#6b7280',marginTop:2}}>Submit a new test plan to the Flight Test Engineering team</p></div></div></div>
      <div style={S.noteBanner}>{'📝'} <span>Only fields marked with <strong style={{color:'#d1495b'}}>*</strong> are required. Fill in as much as you know {'—'} any additional detail helps the FTE get started faster.</span></div>
      {missingFields.length>0&&(<div style={{...S.noteBanner,background:'#fef2f2',borderColor:'#fecaca',color:'#991b1b',animation:shake?'shake 0.4s':'none'}}>{'⚠️'} <span>Please fill in required fields: {missingFields.join(', ')}</span></div>)}
      <div style={S.card}>
        <SectionDivider title="Request Overview"/>
        <TextInput label="Test Plan Title" placeholder='e.g. "Helix State Estimator Validation"' value={form.title} onChange={u('title')} required/>
        <SelectInput label="Test Type" options={TEST_TYPES} value={form.testType} onChange={u('testType')} required/>
        {form.testType==='Other'&&<TextInput label="Describe Test Type" placeholder="Briefly describe the type of test" value={form.otherTestType} onChange={u('otherTestType')}/>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <TextInput label="Your Name" placeholder="First Last" value={form.requestorName} onChange={u('requestorName')} required/>
          <TextInput label="Team / Department" placeholder="e.g. GNC, Aeromech, Firmware" value={form.requestorTeam} onChange={u('requestorTeam')}/>
        </div>
        <TextInput label="Email" placeholder="you@pivotal.aero" value={form.requestorEmail} onChange={u('requestorEmail')} required/>
        <CardSelect label="Provisional Risk Level" options={RISK_LEVELS} value={form.riskLevel} onChange={u('riskLevel')} required hint="Best estimate — FTE will do a full Test Hazard Analysis during planning."/>
        <CardSelect label="Priority" options={PRIORITY} value={form.priority} onChange={u('priority')}/>

        <SectionDivider title="System Under Test"/>
        <TextInput label="System / Test Overview" multiline rows={4} placeholder="Describe what is being tested and why." value={form.systemDescription} onChange={u('systemDescription')} hint="Think: What would a new FTE need to know to get started?"/>
        <TextInput label="Test Objective" multiline rows={3} placeholder="What specific question(s) should this test answer?" value={form.testObjective} onChange={u('testObjective')} required/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <TextInput label="Aircraft / Vehicle Configuration" placeholder='e.g. "Helix Pre-Alpha VER B"' value={form.aircraftConfig} onChange={u('aircraftConfig')}/>
          <TextInput label="Software / Firmware Version" placeholder='e.g. "2026.09 or later"' value={form.softwareVersion} onChange={u('softwareVersion')}/>
        </div>
        <TextInput label="Equipment Under Test (EUT)" multiline rows={2} placeholder="Describe the EUT - what it is, how it mounts, power draw, weight." value={form.eut} onChange={u('eut')} hint="Include EIN, weight, mounting, and interface details if known."/>
        <div style={{marginBottom:22}}>
          <label style={S.label}>Additional Hardware / Instrumentation</label>
          <p style={S.hint}>List any special equipment, sensors, DAQ, or payload needed.</p>
          <div style={{marginBottom:8,display:'flex',gap:8,fontSize:12,color:'#6b7280'}}><span style={{flex:1}}>Equipment</span><span style={{flex:1}}>Notes</span><span style={{width:32}}/></div>
          {form.hardware.map((hw,i)=><HardwareRow key={i} hw={hw} index={i} onUpdate={updateList('hardware')} onRemove={removeFromList('hardware')}/>)}
          <button onClick={addToList('hardware',{name:'',notes:''})} style={S.addBtn}>+ Add Equipment</button>
        </div>
        <TextInput label="Other Configuration Notes" multiline rows={2} placeholder="Any wiring changes, mounting modifications, payload considerations, etc." value={form.configNotes} onChange={u('configNotes')}/>

        <SectionDivider title="Logistics"/>
        <div style={{marginBottom:22}}>
          <label style={S.label}>Key Stakeholders</label>
          <p style={S.hint}>Who should be involved in planning and review?</p>
          <div style={{marginBottom:8,display:'flex',gap:8,fontSize:12,color:'#6b7280'}}><span style={{flex:1}}>Name</span><span style={{flex:1}}>Role / Team</span><span style={{flex:1}}>Email</span><span style={{width:32}}/></div>
          {form.stakeholders.map((s,i)=><StakeholderRow key={i} s={s} index={i} onUpdate={updateList('stakeholders')} onRemove={removeFromList('stakeholders')}/>)}
          <button onClick={addToList('stakeholders',{name:'',role:'',email:''})} style={S.addBtn}>+ Add Stakeholder</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <TextInput label="Estimated Test Duration" placeholder='e.g. "3 flight days"' value={form.estimatedDuration} onChange={u('estimatedDuration')}/>
          <TextInput label="Test Location" placeholder='e.g. "Fort Hunter Liggett 12b"' value={form.testLocation} onChange={u('testLocation')}/>
        </div>
        <TextInput label="Environmental Constraints" multiline rows={2} placeholder='e.g. "Wind < 15 mph on ground, density altitude limits"' value={form.environmentalConstraints} onChange={u('environmentalConstraints')} hint="Describe any weather, time-of-day, or environmental restrictions."/>
        <TextInput label="Additional Notes" multiline rows={3} placeholder="Anything else the FTE should know." value={form.additionalNotes} onChange={u('additionalNotes')}/>

        <SectionDivider title="Reference Documents"/>
        <p style={{...S.hint,marginBottom:12}}>Upload any relevant standards, prior test plans, design docs, or supporting files.</p>
        <div onClick={()=>fileInputRef.current?.click()} style={S.dropZone}
          onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='#2d5cad';e.currentTarget.style.background='#f0f3f9';}}
          onDragLeave={e=>{e.currentTarget.style.borderColor='#d0d4dc';e.currentTarget.style.background='#fafbfc';}}
          onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='#d0d4dc';e.currentTarget.style.background='#fafbfc';setRefFiles(p=>[...p,...Array.from(e.dataTransfer.files)]);}}>
          <input ref={fileInputRef} type="file" multiple style={{display:'none'}} onChange={handleFileChange}/>
          <div style={{fontSize:28,marginBottom:6}}>{'📎'}</div>
          <div style={{fontSize:14,fontWeight:500,color:'#1a2b4a'}}>Click to browse or drag files here</div>
          <div style={{fontSize:12,color:'#9ca3af',marginTop:2}}>PDF, DOCX, XLSX, images, or any relevant file type</div>
        </div>
        {refFiles.length>0&&(<div style={{marginTop:10}}>{refFiles.map((f,i)=>(<div key={i} style={S.fileChip}><span style={{fontSize:14}}>{'📄'}</span><span style={{fontSize:13,color:'#1a2b4a',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span><span style={{fontSize:11,color:'#9ca3af'}}>{(f.size/1024).toFixed(0)} KB</span><button onClick={()=>removeFile(i)} style={{...S.removeBtn,width:24,height:24,fontSize:16}}>{'×'}</button></div>))}</div>)}

        <div style={{marginTop:40,paddingTop:24,borderTop:'2px solid #e5e7eb',display:'flex',justifyContent:'flex-end',alignItems:'center',gap:12}}>
          {generating&&<span style={{fontSize:13,color:'#6b7280',display:'flex',alignItems:'center',gap:8}}><span style={{display:'inline-block',width:16,height:16,border:'2px solid #d0d4dc',borderTopColor:'#2d5cad',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/> Submitting{'...'}</span>}
          <button onClick={handleSubmit} disabled={generating} style={{...S.primaryBtn,background:generating?'#9ca3af':'#1a2b4a',cursor:generating?'not-allowed':'pointer',padding:'14px 36px',fontSize:15}}>{generating?'Submitting...':'Submit Request'}</button>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
